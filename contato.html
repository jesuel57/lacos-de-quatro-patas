<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Laços de Quatro Patas</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
  <header>
    <h1>🐾 Fale Conosco 🐾</h1>
    <nav>
      <a href="index.html">Início</a>
      <a href="produtos.html">Produtos</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
    </nav>
  </header>

  <section>
    <h2>Envie uma mensagem</h2>
    <p>Dúvidas sobre produtos ou dicas para seu pet? Preencha os campos abaixo:</p>
    
    <form action="#" method="POST">
      <input type="text" name="nome" placeholder="Seu nome completo" required style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
      <input type="email" name="email" placeholder="Seu melhor e-mail" required style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
      <textarea name="mensagem" rows="5" placeholder="Como podemos ajudar seu pet?" required style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;"></textarea>
      <button type="submit" style="background: #4CAF50; color: white; padding: 15px; border: none; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer;">Enviar Mensagem</button>
    </form>

    <div style="text-align: center; margin-top: 40px; border-top: 1px solid #eee; padding-top: 25px;">
      <h3>Nossas Redes Sociais</h3>
      <a href="https://wa.me" target="_blank" style="margin: 0 15px; color: #25D366; font-weight: bold; text-decoration: none; font-size: 18px;">WhatsApp</a>
      <a href="https://instagram.com" target="_blank" style="margin: 0 15px; color: #E4405F; font-weight: bold; text-decoration: none; font-size: 18px;">Instagram</a>
    </div>
  </section>

  <footer>
    <p>© 2026 Laços de Quatro Patas | Atendimento Pet</p>
  </footer>
</body>
</html>
